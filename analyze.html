<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Analyzer - Methodic Truth</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .analyzer-container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 2rem;
        }

        .input-section {
            background: rgba(0, 0, 0, 0.6);
            padding: 2rem;
            border: 1px solid var(--glow);
            border-radius: 8px;
            margin-bottom: 2rem;
        }

        .url-input {
            width: 100%;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--glow);
            color: var(--text);
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
        }

        .analyze-btn {
            width: 100%;
            padding: 1rem;
            background: var(--glow);
            color: var(--bg);
            border: none;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
        }

        .analyze-btn:hover {
            box-shadow: 0 0 20px var(--glow);
            transform: translateY(-2px);
        }

        .analyze-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .results-container {
            display: none;
            animation: fadeIn 0.5s;
        }

        .results-container.active {
            display: block;
        }

        .video-info {
            background: rgba(0, 0, 0, 0.6);
            padding: 1.5rem;
            border: 1px solid var(--glow);
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }

        .video-info h2 {
            margin: 0 0 0.5rem 0;
            color: var(--glow);
        }

        .video-info .channel {
            color: var(--dim);
            font-size: 0.9rem;
        }

        .music-data {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .data-card {
            background: rgba(0, 0, 0, 0.6);
            padding: 1.5rem;
            border: 1px solid var(--glow);
            border-radius: 8px;
            text-align: center;
        }

        .data-card .label {
            color: var(--dim);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .data-card .value {
            color: var(--glow);
            font-size: 1.5rem;
            font-weight: bold;
        }

        .chords-section {
            background: rgba(0, 0, 0, 0.6);
            padding: 1.5rem;
            border: 1px solid var(--glow);
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }

        .chords-section h3 {
            margin: 0 0 1rem 0;
            color: var(--glow);
        }

        .chord-progression {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .chord-chip {
            background: var(--glow);
            color: var(--bg);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .analysis-section {
            background: rgba(0, 0, 0, 0.6);
            padding: 1.5rem;
            border: 1px solid var(--glow);
            border-radius: 8px;
        }

        .analysis-section h3 {
            margin: 0 0 1rem 0;
            color: var(--glow);
        }

        .analysis-text {
            line-height: 1.8;
            color: var(--text);
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--glow);
        }

        .spinner {
            border: 3px solid rgba(102, 252, 241, 0.3);
            border-top: 3px solid var(--glow);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error-message {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff0000;
            color: #ff6666;
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">🔮 Home</a>
        <a href="philosophy.html">Philosophy</a>
        <a href="topology.html">Architecture</a>
        <a href="library.html">Chronicles</a>
        <a href="mixer.html">Live Room</a>
        <a href="chord-trainer.html">Music Theory</a>
        <a href="analyze.html" class="active">Song Analyzer</a>
    </nav>

    <main class="analyzer-container">
        <h1>🎵 Song Analyzer</h1>
        <p class="subtitle">Paste a YouTube URL to analyze chords, tempo, and musical characteristics</p>

        <div class="input-section">
            <input type="text" 
                   id="youtube-url" 
                   class="url-input" 
                   placeholder="https://www.youtube.com/watch?v=..."
                   autocomplete="off">
            <button id="analyze-btn" class="analyze-btn">Analyze Song</button>
            <div id="error-container"></div>
        </div>

        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Analyzing song... This may take a moment.</p>
        </div>

        <div id="results" class="results-container">
            <div class="video-info">
                <h2 id="song-title"></h2>
                <p class="channel" id="channel-name"></p>
            </div>

            <div class="music-data">
                <div class="data-card">
                    <div class="label">Key</div>
                    <div class="value" id="key">—</div>
                </div>
                <div class="data-card">
                    <div class="label">Tempo</div>
                    <div class="value" id="tempo">—</div>
                </div>
                <div class="data-card">
                    <div class="label">Time Signature</div>
                    <div class="value" id="time-sig">—</div>
                </div>
                <div class="data-card">
                    <div class="label">Mode</div>
                    <div class="value" id="mode">—</div>
                </div>
            </div>

            <div class="chords-section">
                <h3>Chord Progression</h3>
                <div id="chord-progression" class="chord-progression"></div>
            </div>

            <div class="analysis-section">
                <h3>AI Analysis</h3>
                <div id="analysis-text" class="analysis-text"></div>
            </div>
        </div>
    </main>

    <script type="module">
        const urlInput = document.getElementById('youtube-url');
        const analyzeBtn = document.getElementById('analyze-btn');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results');
        const errorContainer = document.getElementById('error-container');

        function extractVideoId(url) {
            const patterns = [
                /(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\s]+)/,
                /youtube\.com\/embed\/([^&\s]+)/
            ];
            
            for (const pattern of patterns) {
                const match = url.match(pattern);
                if (match) return match[1];
            }
            return null;
        }

        function showError(message) {
            errorContainer.innerHTML = `<div class="error-message">${message}</div>`;
        }

        function clearError() {
            errorContainer.innerHTML = '';
        }

        analyzeBtn.addEventListener('click', async () => {
            const url = urlInput.value.trim();
            
            if (!url) {
                showError('Please enter a YouTube URL');
                return;
            }

            const videoId = extractVideoId(url);
            if (!videoId) {
                showError('Invalid YouTube URL');
                return;
            }

            clearError();
            analyzeBtn.disabled = true;
            loading.style.display = 'block';
            results.classList.remove('active');

            try {
                const response = await fetch(`/api/analyze?videoId=${videoId}`);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Analysis failed');
                }

                // Update UI with results
                document.getElementById('song-title').textContent = data.title;
                document.getElementById('channel-name').textContent = data.channel;
                document.getElementById('key').textContent = data.musicData.key || '—';
                document.getElementById('tempo').textContent = data.musicData.tempo ? `${data.musicData.tempo} BPM` : '—';
                document.getElementById('time-sig').textContent = data.musicData.timeSignature || '—';
                document.getElementById('mode').textContent = data.musicData.mode || '—';

                // Render chords
                const chordContainer = document.getElementById('chord-progression');
                chordContainer.innerHTML = '';
                if (data.musicData.chords && data.musicData.chords.length > 0) {
                    data.musicData.chords.forEach(chord => {
                        const chip = document.createElement('div');
                        chip.className = 'chord-chip';
                        chip.textContent = chord;
                        chordContainer.appendChild(chip);
                    });
                } else {
                    chordContainer.innerHTML = '<p style="color: var(--dim);">Chord detection unavailable</p>';
                }

                // Render AI analysis
                document.getElementById('analysis-text').innerHTML = data.analysis
                    .split('\n')
                    .map(p => `<p>${p}</p>`)
                    .join('');

                results.classList.add('active');
            } catch (error) {
                showError(error.message);
            } finally {
                analyzeBtn.disabled = false;
                loading.style.display = 'none';
            }
        });

        // Allow Enter key to trigger analysis
        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                analyzeBtn.click();
            }
        });
    </script>
</body>
</html>

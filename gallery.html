<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>The Gallery вАФ Methodic Truth</title>
  <meta name="description" content="Art speaks. We listen. Share visual art, photography, generative work, and music in a space with no likes and no algorithms.">
  <meta property="og:title" content="The Gallery вАФ Methodic Truth">
  <meta property="og:description" content="Art speaks. We listen. A gallery with no likes, no algorithms.">
  <meta property="og:image" content="https://methodictruth.com/og-image.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=56">
  <style>
    .gallery-room {
      min-height: 100vh;
      position: relative; z-index: 1;
      max-width: 780px;
      margin: 0 auto;
      padding: 2rem clamp(1rem, 4vw, 2rem) 6rem;
    }

    /* Header */
    .gallery-header {
      text-align: center;
      padding: 2rem 0 1.5rem;
      border-bottom: 1px solid rgba(200, 160, 120, 0.04);
      margin-bottom: 2rem;
    }
    .gallery-glyph {
      font-size: 2rem; opacity: 0.12;
      animation: gallery-breathe 8s ease-in-out infinite;
    }
    @keyframes gallery-breathe {
      0%, 100% { opacity: 0.08; }
      50% { opacity: 0.18; text-shadow: 0 0 30px rgba(200, 160, 120, 0.06); }
    }
    .gallery-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(1rem, 3vw, 1.4rem);
      font-weight: 400;
      color: rgba(200, 180, 150, 0.45);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin: 0.5rem 0 0.3rem;
    }
    .gallery-sub {
      font-family: 'EB Garamond', serif;
      font-size: clamp(0.7rem, 1.8vw, 0.8rem);
      font-style: italic;
      color: rgba(200, 160, 120, 0.15);
    }
    .gallery-back {
      display: inline-block; margin-top: 0.8rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.5rem; color: rgba(200, 180, 150, 0.15);
      text-decoration: none; letter-spacing: 0.15em;
      transition: color 0.3s;
    }
    .gallery-back:hover { color: rgba(200, 180, 150, 0.4); }

    /* вФАвФАвФА UPLOAD PANEL вФАвФАвФА */
    .gallery-upload {
      margin-bottom: 2.5rem;
      padding: 1.2rem;
      background: rgba(10, 8, 5, 0.4);
      border: 1px solid rgba(200, 160, 120, 0.03);
      position: relative;
    }
    .gallery-upload::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(200, 160, 120, 0.06), transparent);
    }
    .gallery-upload-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.5rem;
      color: rgba(200, 160, 120, 0.2);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
    }
    .gallery-identity-bar {
      display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.5rem;
    }
    .gallery-identity-sigil { font-size: 1rem; opacity: 0.35; }
    .gallery-identity-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.55rem; color: rgba(200, 180, 150, 0.3); letter-spacing: 0.1em;
    }
    .gallery-identity-change {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.4rem; color: rgba(200, 180, 150, 0.12);
      cursor: pointer; text-decoration: none; margin-left: auto;
      transition: color 0.3s;
    }
    .gallery-identity-change:hover { color: rgba(200, 180, 150, 0.35); }

    /* Drop zone */
    .gallery-dropzone {
      border: 1px dashed rgba(200, 160, 120, 0.08);
      padding: 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      margin-bottom: 0.6rem;
    }
    .gallery-dropzone:hover, .gallery-dropzone.dragover {
      border-color: rgba(200, 160, 120, 0.2);
      background: rgba(200, 160, 120, 0.02);
    }
    .gallery-dropzone-text {
      font-family: 'EB Garamond', serif;
      font-size: 0.8rem;
      font-style: italic;
      color: rgba(200, 160, 120, 0.2);
    }
    .gallery-dropzone-hint {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.4rem;
      color: rgba(200, 160, 120, 0.1);
      letter-spacing: 0.1em;
      margin-top: 0.3rem;
    }
    .gallery-preview {
      max-width: 100%; max-height: 300px;
      margin: 0.5rem auto; display: none;
      border: 1px solid rgba(200, 160, 120, 0.06);
    }
    .gallery-caption-input {
      width: 100%; background: rgba(5, 3, 2, 0.6);
      border: 1px solid rgba(138, 126, 107, 0.06);
      color: rgba(200, 180, 150, 0.6);
      font-family: 'EB Garamond', serif;
      font-size: 0.85rem; font-style: italic;
      padding: 0.5rem; box-sizing: border-box;
      outline: none;
    }
    .gallery-caption-input::placeholder { color: rgba(138, 126, 107, 0.15); }
    .gallery-upload-footer {
      display: flex; justify-content: flex-end; margin-top: 0.5rem;
    }
    .gallery-submit {
      background: rgba(10, 8, 5, 0.6);
      border: 1px solid rgba(200, 160, 120, 0.08);
      color: rgba(200, 180, 150, 0.3);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.55rem; letter-spacing: 0.15em;
      padding: 0.4rem 1rem; cursor: pointer;
      transition: all 0.3s;
    }
    .gallery-submit:hover {
      border-color: rgba(200, 160, 120, 0.2);
      color: rgba(200, 180, 150, 0.6);
    }
    .gallery-submit:disabled { opacity: 0.3; cursor: default; }

    /* вФАвФАвФА WALL (gallery grid) вФАвФАвФА */
    .gallery-wall {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(240px, 100%), 1fr));
      gap: 1px;
    }

    .gallery-piece {
      position: relative;
      background: rgba(10, 8, 5, 0.3);
      border: 1px solid rgba(200, 160, 120, 0.03);
      overflow: hidden;
      transition: border-color 0.3s;
    }
    .gallery-piece:hover {
      border-color: rgba(200, 160, 120, 0.1);
    }
    .gallery-piece-img {
      width: 100%;
      display: block;
      cursor: pointer;
      transition: opacity 0.3s;
    }
    .gallery-piece:hover .gallery-piece-img { opacity: 0.9; }

    .gallery-piece-info {
      padding: 0.6rem 0.8rem;
    }
    .gallery-piece-caption {
      font-family: 'EB Garamond', serif;
      font-size: 0.8rem;
      font-style: italic;
      color: rgba(200, 180, 150, 0.4);
      line-height: 1.5;
      margin-bottom: 0.3rem;
    }
    .gallery-piece-meta {
      display: flex; align-items: center; gap: 0.3rem;
    }
    .gallery-piece-sigil { font-size: 0.7rem; opacity: 0.2; }
    .gallery-piece-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.45rem; color: rgba(200, 180, 150, 0.2);
      letter-spacing: 0.08em;
    }
    .gallery-piece-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.4rem; color: rgba(200, 180, 150, 0.1);
      margin-left: auto;
    }

    /* вФАвФАвФА LIGHTBOX вФАвФАвФА */
    .gallery-lightbox {
      display: none;
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(5, 2, 8, 0.95);
      z-index: 9999;
      justify-content: center; align-items: center;
      cursor: pointer;
    }
    .gallery-lightbox.open { display: flex; }
    .gallery-lightbox img {
      max-width: 92vw; max-height: 90vh;
      border: 1px solid rgba(200, 160, 120, 0.06);
    }
    .gallery-lightbox-close {
      position: absolute; top: 1rem; right: 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem; color: rgba(200, 180, 150, 0.3);
      cursor: pointer; background: none; border: none;
      transition: color 0.2s;
    }
    .gallery-lightbox-close:hover { color: rgba(200, 180, 150, 0.7); }
    .gallery-lightbox-caption {
      position: absolute; bottom: 2rem; left: 0; right: 0;
      text-align: center;
      font-family: 'EB Garamond', serif;
      font-size: 0.9rem; font-style: italic;
      color: rgba(200, 180, 150, 0.4);
    }

    /* Empty */
    .gallery-empty {
      text-align: center; padding: 3rem 1rem;
      grid-column: 1 / -1;
    }
    .gallery-empty-text {
      font-family: 'EB Garamond', serif;
      font-size: 0.85rem; font-style: italic;
      color: rgba(200, 160, 120, 0.15);
    }

    /* Loading */
    .gallery-loading {
      text-align: center; padding: 2rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.5rem; color: rgba(200, 180, 150, 0.12);
      letter-spacing: 0.2em; grid-column: 1 / -1;
    }
  </style>
</head>
<body>
  <div class="gallery-room">
    <div class="gallery-header">
      <div class="gallery-glyph">рУЛє</div>
      <h1 class="gallery-title">The Gallery</h1>
      <div class="gallery-sub">art speaks. we listen.</div>
      <a href="salon.html" class="gallery-back">вЖР the salon</a>
    </div>

    <!-- Upload -->
    <div class="gallery-upload" id="uploadSection">
      <div class="gallery-identity-bar" id="galleryIdentityBar">
        <span class="gallery-identity-sigil" id="gallerySigil"></span>
        <span class="gallery-identity-name" id="galleryName">unnamed</span>
        <a class="gallery-identity-change" id="galleryChangeName">change</a>
      </div>
      <div class="gallery-upload-label">hang something on the wall</div>
      <div class="gallery-dropzone" id="dropzone">
        <div class="gallery-dropzone-text">drop an image here, or tap to choose</div>
        <div class="gallery-dropzone-hint">jpg ¬Ј png ¬Ј gif ¬Ј webp ¬Ј max 2mb</div>
        <input type="file" id="fileInput" accept="image/*" style="display:none;">
      </div>
      <img class="gallery-preview" id="preview">
      <input type="text" class="gallery-caption-input" id="captionInput" placeholder="a few words about this piece..." maxlength="200" style="display:none;">
      <div class="gallery-upload-footer">
        <button class="gallery-submit" id="hangBtn" disabled>hang it</button>
      </div>
    </div>

    <!-- Wall -->
    <div class="gallery-loading" id="loadingMsg">looking...</div>
    <div class="gallery-wall" id="galleryWall"></div>
  </div>

  <!-- Lightbox -->
  <div class="gallery-lightbox" id="lightbox">
    <button class="gallery-lightbox-close">вЬХ</button>
    <img id="lightboxImg" src="">
    <div class="gallery-lightbox-caption" id="lightboxCaption"></div>
  </div>

  <!-- Firebase -->
  <script src="lib/firebase-app-compat.js"></script>
  <script src="lib/firebase-database-compat.js"></script>
  <script>
  (function() {
    const firebaseConfig = {
      apiKey: "AIzaSyDosCOXMInZQoOkgNEhbTCzzXEy1rdkCFA",
      authDomain: "methodictruth.firebaseapp.com",
      databaseURL: "https://methodictruth-default-rtdb.firebaseio.com",
      projectId: "methodictruth",
      storageBucket: "methodictruth.firebasestorage.app",
      messagingSenderId: "415814328505",
      appId: "1:415814328505:web:6f8ad89f05d944d4087b68"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const roomRef = db.ref('salon/rooms/gallery');

    // Sigils
    const SIGILS = ['рУБє','рУВА','рУЛє','рУГ≠','рУЕУ','рУЖ£','рУЗ≥','рУИЦ','рУКЭ','рУМЩ','рТА≠','рТБЊ','рТЖ≥','рТИЧ','рТМУ','вШК','вШН','вМЗ','вЧИ','вЧЗ','вђ°','вП¶','вКє','вКњ','вЛЃ','вМђ'];
    function hashStr(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return Math.abs(h);}
    function getSigil(n){return SIGILS[hashStr(n)%SIGILS.length];}

    // Identity
    let identity = JSON.parse(localStorage.getItem('salon-identity') || 'null');
    const gallerySigil = document.getElementById('gallerySigil');
    const galleryName = document.getElementById('galleryName');
    const galleryChangeName = document.getElementById('galleryChangeName');

    function updateIdentity() {
      if (identity) {
        gallerySigil.textContent = identity.sigil;
        galleryName.textContent = identity.name;
      } else {
        gallerySigil.textContent = 'вЧЗ';
        galleryName.textContent = 'unnamed';
      }
    }
    updateIdentity();

    galleryChangeName.addEventListener('click', () => {
      const name = prompt('What shall we call you?', identity ? identity.name : '');
      if (name && name.trim()) {
        identity = { name: name.trim(), sigil: getSigil(name.trim()), created: Date.now() };
        localStorage.setItem('salon-identity', JSON.stringify(identity));
        updateIdentity();
      }
    });

    // File handling
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const captionInput = document.getElementById('captionInput');
    const hangBtn = document.getElementById('hangBtn');
    let pendingImage = null; // base64 data URL

    dropzone.addEventListener('click', () => fileInput.click());
    dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', () => {
      if (fileInput.files.length) handleFile(fileInput.files[0]);
    });

    function handleFile(file) {
      if (!file.type.startsWith('image/')) return;
      if (file.size > 2 * 1024 * 1024) { alert('Max 2MB'); return; }

      const reader = new FileReader();
      reader.onload = (e) => {
        // Resize to max 800px wide to keep Firebase payload reasonable
        const img = new Image();
        img.onload = () => {
          const maxW = 800;
          let w = img.width, h = img.height;
          if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          pendingImage = canvas.toDataURL('image/jpeg', 0.8);
          preview.src = pendingImage;
          preview.style.display = 'block';
          captionInput.style.display = 'block';
          hangBtn.disabled = !identity;
          dropzone.querySelector('.gallery-dropzone-text').textContent = 'image ready';
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    // Submit
    hangBtn.addEventListener('click', async () => {
      if (!identity || !pendingImage) return;
      hangBtn.disabled = true;
      hangBtn.textContent = 'hanging...';

      const vid = localStorage.getItem('mt-vid') || ('v-' + Date.now().toString(36) + Math.random().toString(36).substr(2,5));
      localStorage.setItem('mt-vid', vid);

      await roomRef.push({
        name: identity.name,
        sigil: identity.sigil,
        image: pendingImage,
        caption: captionInput.value.trim(),
        ts: firebase.database.ServerValue.TIMESTAMP,
        visitor: vid
      });

      // Reset
      pendingImage = null;
      preview.style.display = 'none';
      captionInput.style.display = 'none';
      captionInput.value = '';
      hangBtn.textContent = 'hang it';
      hangBtn.disabled = true;
      dropzone.querySelector('.gallery-dropzone-text').textContent = 'drop an image here, or tap to choose';
    });

    // Time formatting
    function relativeTime(ts) {
      const diff = Date.now() - ts;
      const mins = Math.floor(diff / 60000);
      const hours = Math.floor(diff / 3600000);
      const days = Math.floor(diff / 86400000);
      if (mins < 1) return 'just now';
      if (mins < 60) return mins + ' min ago';
      if (hours < 24) return hours + 'h ago';
      if (days < 7) return days + 'd ago';
      if (days < 30) return Math.floor(days / 7) + ' weeks ago';
      return Math.floor(days / 30) + ' moons ago';
    }

    function escapeHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

    // Render
    const galleryWall = document.getElementById('galleryWall');
    const loadingMsg = document.getElementById('loadingMsg');

    roomRef.orderByChild('ts').on('value', (snap) => {
      loadingMsg.style.display = 'none';
      const data = snap.val();
      if (!data) {
        galleryWall.innerHTML = '<div class="gallery-empty"><div class="gallery-empty-text">The walls are bare. Be the first to hang something.</div></div>';
        return;
      }

      const pieces = Object.entries(data).sort((a,b) => (b[1].ts||0) - (a[1].ts||0));
      galleryWall.innerHTML = pieces.map(([id, p]) => `
        <div class="gallery-piece" data-id="${id}">
          <img class="gallery-piece-img" src="${p.image}" alt="${escapeHtml(p.caption || '')}" loading="lazy">
          <div class="gallery-piece-info">
            ${p.caption ? `<div class="gallery-piece-caption">${escapeHtml(p.caption)}</div>` : ''}
            <div class="gallery-piece-meta">
              <span class="gallery-piece-sigil">${escapeHtml(p.sigil || 'вЧЗ')}</span>
              <span class="gallery-piece-name">${escapeHtml(p.name || 'unnamed')}</span>
              <span class="gallery-piece-time">${relativeTime(p.ts || Date.now())}</span>
            </div>
          </div>
        </div>
      `).join('');

      // Lightbox bindings
      galleryWall.querySelectorAll('.gallery-piece-img').forEach(img => {
        img.addEventListener('click', () => {
          document.getElementById('lightboxImg').src = img.src;
          document.getElementById('lightboxCaption').textContent = img.alt || '';
          document.getElementById('lightbox').classList.add('open');
        });
      });
    });

    // Lightbox close
    const lightbox = document.getElementById('lightbox');
    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox || e.target.classList.contains('gallery-lightbox-close')) {
        lightbox.classList.remove('open');
      }
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') lightbox.classList.remove('open');
    });

    // Analytics
    const vid = localStorage.getItem('mt-vid') || ('v-' + Date.now().toString(36) + Math.random().toString(36).substr(2,5));
    localStorage.setItem('mt-vid', vid);
    fetch('https://methodictruth-default-rtdb.firebaseio.com/analytics/views.json', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({page:'gallery.html',visitor:vid,ts:Date.now(),ref:document.referrer||'direct',screen:screen.width+'x'+screen.height})
    }).catch(()=>{});
  })();
  </script>
</body>
</html>
